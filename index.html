<html xmlns="http://www.w3.org/1999/xhtml">
<head> 
    <title>Welcome!</title>
  
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="zizi.n.things.css">
</head>

<body>

<div style="
    padding: 60px 40px;
    margin: 20px;
    background: white;
    border-radius: 30px;
    position: relative;
">

    <!-- Top flower line -->
    <div style="
        position: absolute;
        top: -35px;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 28px;
        font-family: 'Space Grotesk', sans-serif;
    ">
        ✿ ✿ ✿ ✿ ✿ ✿ ✿ ✿ ✿
    </div>

    <!-- Bottom flower line -->
    <div style="
        position: absolute;
        bottom: -35px;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 28px;
        font-family: 'Space Grotesk', sans-serif;
    ">
        ✿ ✿ ✿ ✿ ✿ ✿ ✿ ✿ ✿
    </div>

    <!-- Left flower line -->
    <div style="
        position: absolute;
        top: 0;
        bottom: 0;
        left: -35px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        font-size: 28px;
        font-family: 'Space Grotesk', sans-serif;
        padding: 20px 0;
    ">
        ✿<br>✿<br>✿<br>✿<br>✿
    </div>

    <!-- Right flower line -->
    <div style="
        position: absolute;
        top: 0;
        bottom: 0;
        right: -35px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        font-size: 28px;
        font-family: 'Space Grotesk', sans-serif;
        padding: 20px 0;
    ">
        ✿<br>✿<br>✿<br>✿<br>✿
    </div>

    <!-- Your content -->
    <h1 style="height: 98px; text-align: center;">Welcome!</h1>

    <div style="display: flex; justify-content: center; gap: 40px; margin-bottom: 30px;">
        <iframe width="560" height="315"
            src="https://www.youtube-nocookie.com/embed/ALKJfU3etZs"
            title="YouTube video player"
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen
            style="border-radius: 15px;">
        </iframe>

        <iframe width="560" height="315"
            src="https://www.youtube-nocookie.com/embed/Fz9E0CX-BkI"
            title="YouTube video player"
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope;"
            allowfullscreen
            style="border-radius: 15px;">
        </iframe>
    </div>

    <p style="text-align: center; font-size: 20px; font-family: Sacramento;">
        hi
    </p>

</div>
